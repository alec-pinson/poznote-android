name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: poznote-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  release:
    name: Pre-release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: poznote-debug

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: mv app-debug.apk poznote-${{ steps.sha.outputs.short }}.apk

      - name: Delete existing pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete pre-release --yes --cleanup-tag 2>/dev/null || true

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create pre-release \
            --title "Latest build ($(git log -1 --format='%s'))" \
            --notes "$(cat <<'EOF'
          ## Debug APK — latest from \`main\`

          Built from commit [${{ steps.sha.outputs.short }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

          ### Install on Android
          1. Download the APK below
          2. Open it on your phone (enable *Install unknown apps* if prompted)
          3. Enter your poznote server URL + credentials on first launch
          EOF
          )" \
            --prerelease \
            --target main \
            poznote-${{ steps.sha.outputs.short }}.apk
